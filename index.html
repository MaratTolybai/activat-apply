<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Activat.vc - Startup Intake</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f4f5f7;
      color: #1a1a2e;
      font-size: 14px;
      padding-bottom: 80px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      padding: 14px 24px;
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
    }
    .header h1 { font-size: 20px; font-weight: 700; color: #1a1a2e; }

    /* ── Layout ── */
    .page {
      display: flex;
      gap: 20px;
      padding: 20px 24px;
      max-width: 1280px;
      margin: 0 auto;
      align-items: flex-start;
    }
    .main { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 10px; }

    /* ── Accordion card ── */
    .acc-card { border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); border: 1px solid #e5e7eb; }

    .acc-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      cursor: pointer;
      user-select: none;
      transition: filter 0.15s;
    }
    .acc-header:hover { background: #e8ecf0 !important; }

    /* Neutral accordion headers */
    .acc-card:nth-child(1) .acc-header { background: #f1f5f9; color: #1a1a2e; }
    .acc-card:nth-child(2) .acc-header { background: #f1f5f9; color: #1a1a2e; }
    .acc-card:nth-child(3) .acc-header { background: #f1f5f9; color: #1a1a2e; }

    .acc-title { font-size: 15px; font-weight: 700; }

    .acc-arrow {
      width: 0; height: 0;
      border-left: 6px solid transparent;
      border-right: 6px solid transparent;
      border-top: 8px solid #6b7280;
      transition: transform 0.25s;
      flex-shrink: 0;
    }
    .acc-card.open .acc-arrow { transform: rotate(180deg); }

    .acc-body {
      background: #fff;
      padding: 0;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s ease, padding 0.25s ease;
    }
    .acc-card.open .acc-body {
      max-height: 4000px;
      padding: 24px;
      overflow: visible;
    }

    /* ── Grid helpers ── */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .col-full { grid-column: 1 / -1; }

    /* ── Form fields ── */
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label {
      font-size: 13px;
      font-weight: 500;
      color: #374151;
      display: flex;
      align-items: center;
      gap: 3px;
    }
    .field label .req { color: #ef4444; }

    input[type="text"],
    input[type="url"],
    input[type="email"],
    input[type="number"],
    textarea,
    select {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 14px;
      color: #1a1a2e;
      background: #fff;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, textarea:focus, select:focus {
      border-color: #2563b0;
      box-shadow: 0 0 0 3px rgba(37,99,176,0.13);
    }
    textarea { resize: vertical; min-height: 90px; }

    /* ── Info tooltip ── */
    .info-wrap { position: relative; display: inline-flex; align-items: center; flex-shrink: 0; }
    .info-btn {
      width: 15px; height: 15px;
      border-radius: 50%;
      border: 1.5px solid #9ca3af;
      background: none;
      color: #9ca3af;
      font-size: 9px; font-weight: 700; font-style: italic;
      cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
      line-height: 1; padding: 0;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .info-btn:hover, .info-btn.active { border-color: #2563b0; color: #2e6da4; background: #e8f0fa; }
    .tooltip-box {
      display: none;
      position: fixed;
      background: #1e293b; color: #f1f5f9;
      font-size: 12px; font-weight: 400; line-height: 1.55;
      padding: 10px 14px; border-radius: 8px;
      width: 270px; z-index: 9999;
      box-shadow: 0 4px 20px rgba(0,0,0,0.22);
      pointer-events: none;
    }
    .tooltip-box::before {
      content: ''; position: absolute;
      left: -5px; top: 50%; transform: translateY(-50%);
      border-width: 5px 5px 5px 0; border-style: solid;
      border-color: transparent #1e293b transparent transparent;
    }
    .tooltip-box.visible { display: block; }
